# Render deployment config — defines both services
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to https://render.com and create a new "Blueprint" using this file
#   3. Deploy the ML service first, copy its URL
#   4. Set PYTHON_SERVICE_URL in the backend service environment to that URL

services:
  # --- Python Flask ML service ---
  - type: web
    name: diabetes-ml-service
    runtime: python
    rootDir: backend/ml
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn predict_service:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000

  # --- Node.js Express backend ---
  - type: web
    name: diabetes-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_SERVICE_URL
        sync: false  # Fill this in manually after deploying the ML service above
      - key: FRONTEND_ORIGIN
        sync: false  # Set to your GitHub Pages URL e.g. https://yourusername.github.io/Diabetes-Risk-Prediction-Dashboard
