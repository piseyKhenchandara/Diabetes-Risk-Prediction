# Development — hot reload for all services
# Usage: docker compose -f docker-compose.dev.yml up --build

services:

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:5000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      FRONTEND_ORIGIN: http://localhost:5173
      PYTHON_SERVICE_URL: http://ml:5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/diabetes
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started

  ml:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/ml:/app
    ports:
      - "5001:5001"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diabetes
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
