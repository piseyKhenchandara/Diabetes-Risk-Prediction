# Development — hot reload for all services
# Usage: docker compose -f docker-compose.dev.yml up --build

services:

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:5000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      FRONTEND_ORIGIN: http://localhost:5173
      PYTHON_SERVICE_URL: http://ml:5001
    depends_on:
      - ml

  ml:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/ml:/app
    ports:
      - "5001:5001"
