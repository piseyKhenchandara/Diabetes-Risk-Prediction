# Production — API services behind nginx
# Frontend is deployed separately on Cloudflare Pages
# Usage: docker compose up --build

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diabetes_backend
    expose:
      - "5000"
    environment:
      PORT: 5000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}   # your Cloudflare Pages URL
      PYTHON_SERVICE_URL: http://diabetes_ml:5001
    depends_on:
      - ml
    networks:
      - lcms_network
    restart: unless-stopped

  ml:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile
    container_name: diabetes_ml
    expose:
      - "5001"
    networks:
      - lcms_network
    restart: unless-stopped

networks:
  lcms_network:
    external: true
